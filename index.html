<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Ops Feed</title>
  <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.10/dist/dexie.min.js"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f6f8;
      --bg-tertiary: #eef0f3;
      --text-primary: #1a1d21;
      --text-secondary: #5c6370;
      --text-muted: #8b939e;
      --border: #e2e5ea;
      --border-strong: #cdd2d9;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --high: #dc2626;
      --high-bg: #fef2f2;
      --low: #16a34a;
      --low-bg: #f0fdf4;
      --none: #6b7280;
      --none-bg: #f3f4f6;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
      --nav-height: 56px;
      --sidebar-width: 260px;
      --radius: 10px;
      --radius-sm: 6px;
      --transition: 0.2s ease;
    }

    html.dark {
      --bg-primary: #1e2126;
      --bg-secondary: #252a31;
      --bg-tertiary: #2d333b;
      --text-primary: #e8eaed;
      --text-secondary: #a8b0bb;
      --text-muted: #6b7585;
      --border: #3d4450;
      --border-strong: #4d5563;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --danger: #f87171;
      --danger-bg: #3b2020;
      --success: #4ade80;
      --success-bg: #1a2e22;
      --high: #f87171;
      --high-bg: #3b2020;
      --low: #4ade80;
      --low-bg: #1a2e22;
      --none: #9ca3af;
      --none-bg: #374151;
      --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.25);
      --shadow-lg: 0 8px 30px rgba(0,0,0,.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
    }

    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Loading */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Nav */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: var(--nav-height);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: env(safe-area-inset-top, 0) max(0.75rem, env(safe-area-inset-right, 0)) 0 max(0.75rem, env(safe-area-inset-left, 0));
      gap: 0.5rem;
    }
    .logo {
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--text-primary); font-weight: 500; }
    .nav-filters {
      flex: 1;
      display: none;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .nav-filters select, .nav-filters input[type="date"] {
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      font-size: 0.8rem;
      max-width: 120px;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
    }
    .icon-btn {
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }
    .icon-btn:hover { background: var(--bg-tertiary); }
    .menu-toggle { display: flex; }
    @media (min-width: 1024px) {
      .nav-filters { display: flex; }
      .menu-toggle { display: none; }
      .top-nav { padding-left: 1rem; padding-right: 1rem; gap: 1rem; }
    }

    /* Layout */
    .app-layout {
      display: grid;
      grid-template-columns: 1fr;
      max-width: 1400px;
      margin: 0 auto;
      min-height: calc(100vh - var(--nav-height));
    }
    @media (min-width: 1024px) {
      .app-layout {
        grid-template-columns: var(--sidebar-width) 1fr;
      }
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-primary);
      border-right: 1px solid var(--border);
      padding: 1rem;
      padding-bottom: max(1rem, env(safe-area-inset-bottom, 0));
      position: fixed;
      top: 0;
      left: 0;
      width: min(var(--sidebar-width), 100vw);
      max-width: 320px;
      height: 100%;
      height: 100dvh;
      padding-top: calc(var(--nav-height) + env(safe-area-inset-top, 0) + 0.5rem);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 90;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 85;
    }
    .sidebar-backdrop.visible { display: block; }
    @media (min-width: 1024px) {
      .sidebar {
        position: sticky;
        top: var(--nav-height);
        transform: none;
        height: calc(100vh - var(--nav-height));
        height: calc(100dvh - var(--nav-height));
        width: var(--sidebar-width);
        max-width: none;
        padding-top: 1rem;
      }
      .sidebar-backdrop { display: none !important; }
    }

    .filter-panel h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .filter-group { margin-bottom: 1rem; }
    .filter-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
      color: var(--text-secondary);
    }
    .filter-group select,
    .filter-group input[type="date"] {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
    }
    .view-toggle {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .view-toggle button {
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition: all var(--transition);
    }
    .view-toggle button:hover { background: var(--bg-tertiary); }
    .view-toggle button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    html.dark .view-toggle button.active { color: #1a1d21; }
    .btn-clear {
      width: 100%;
      padding: 0.55rem;
      margin-top: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      transition: all var(--transition);
    }
    .btn-clear:hover { background: var(--bg-tertiary); border-color: var(--border-strong); }

    /* Main */
    .main-content {
      padding: 1rem;
      min-width: 0;
    }

    /* Stats */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    @media (min-width: 600px) {
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 768px) {
      .stats-bar { grid-template-columns: repeat(5, 1fr); }
    }
    .stat-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      text-align: center;
    }
    .stat-card .value {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* Feed header */
    .feed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
      transition: background var(--transition);
    }
    .btn-primary:hover { background: var(--accent-hover); }
    html.dark .btn-primary { color: #1a1d21; }

    /* Posts */
    .feed { display: flex; flex-direction: column; gap: 1rem; }
    .post-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow);
      animation: fadeIn 0.4s ease;
      position: relative;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .post-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      padding-right: 4.5rem;
    }
    .post-actions {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      display: flex;
      gap: 0.25rem;
    }
    .btn-edit-post,
    .btn-delete-post {
      position: static;
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    .btn-edit-post:hover { color: var(--accent); background: var(--bg-tertiary); }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge-branch { background: var(--bg-tertiary); color: var(--text-primary); }
    .badge-cashier { background: #e0e7ff; color: #3730a3; }
    html.dark .badge-cashier { background: #312e81; color: #c7d2fe; }
    .badge-date { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .badge-high { background: var(--high-bg); color: var(--high); }
    .badge-low { background: var(--low-bg); color: var(--low); }
    .badge-none { background: var(--none-bg); color: var(--none); }
    .post-time {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: auto;
    }
    .btn-delete-post:hover { color: var(--danger); background: var(--danger-bg); }

    /* Tasks */
    .task-list { list-style: none; margin: 0.5rem 0; }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
    }
    .task-item:last-child { border-bottom: none; }
    .task-checkbox {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-checkbox:checked + .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .task-text { flex: 1; word-break: break-word; transition: color 0.2s; }
    .task-item.checked .task-checkbox { animation: checkPop 0.3s ease; }
    @keyframes checkPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .task-progress-text {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin: 0.5rem 0 0.35rem;
    }
    .progress-bar {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--success);
      border-radius: 999px;
      transition: width 0.35s ease;
    }

    /* Comments */
    .comment-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .comment-display {
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 0.75rem;
    }
    .comment-text { white-space: pre-wrap; margin-bottom: 0.5rem; }
    .comment-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .comment-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .btn-sm {
      padding: 0.35rem 0.65rem;
      font-size: 0.8rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: background var(--transition);
    }
    .btn-sm:hover { background: var(--bg-tertiary); }
    .attachments { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .attachment-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform var(--transition);
    }
    .attachment-thumb:hover { transform: scale(1.05); }
    .attachment-file {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.6rem;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      text-decoration: none;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .attachment-file:hover { text-decoration: underline; }
    .comment-form textarea {
      width: 100%;
      min-height: 80px;
      padding: 0.6rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      resize: vertical;
      margin-bottom: 0.5rem;
    }
    .comment-form .file-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .pending-attachments { display: flex; flex-wrap: wrap; gap: 0.35rem; font-size: 0.75rem; }
    .pending-tag {
      background: var(--bg-tertiary);
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-sm);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--text-secondary);
    }
    .empty-illustration {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
    }
    .empty-state h3 { margin-bottom: 0.5rem; color: var(--text-primary); }
    .empty-state p { margin-bottom: 1rem; }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: var(--bg-primary);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h2 { margin-bottom: 1rem; font-size: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
    }
    .label-optional {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .form-group input[type="text"],
    .form-group input[type="date"],
    .form-group select {
      width: 100%;
      padding: 0.55rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
    }
    .branch-add-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
      align-items: center;
    }
    .branch-add-row input[type="text"] {
      flex: 1;
      min-width: 140px;
      padding: 0.55rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
    }
    .branch-add-cancel {
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .branch-add-cancel:hover { color: var(--text-primary); }
    .priority-toggle {
      display: flex;
      gap: 0.5rem;
    }
    .priority-toggle button {
      flex: 1;
      padding: 0.55rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-weight: 600;
      transition: all var(--transition);
    }
    .priority-toggle button.high.active {
      border-color: var(--high);
      background: var(--high-bg);
      color: var(--high);
    }
    .priority-toggle button.low.active {
      border-color: var(--low);
      background: var(--low-bg);
      color: var(--low);
    }
    .priority-toggle button.none.active {
      border-color: var(--none);
      background: var(--none-bg);
      color: var(--none);
    }
    .priority-toggle { flex-wrap: wrap; }
    .task-builder {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .task-builder input { flex: 1; padding: 0.55rem; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-secondary); }
    .draft-tasks { list-style: none; margin: 0.5rem 0; }
    .draft-tasks li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0.5rem;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      margin-bottom: 0.35rem;
      font-size: 0.9rem;
    }
    .draft-tasks .remove-task {
      color: var(--danger);
      font-size: 1.2rem;
      line-height: 1;
      padding: 0 0.35rem;
    }
    .draft-tasks .remove-task:hover { opacity: 0.8; }
    .draft-tasks .draft-task-edit {
      flex: 1;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      font-size: 0.9rem;
    }
    .draft-tasks li { gap: 0.5rem; }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }
    .btn-secondary {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .btn-secondary:hover { background: var(--bg-tertiary); }

    /* Confirm dialog */
    .confirm-dialog .modal { max-width: 400px; text-align: center; }
    .confirm-dialog .modal-actions { justify-content: center; }
    .btn-danger {
      background: var(--danger);
      color: #fff;
      padding: 0.6rem 1rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
    }
    .btn-danger:hover { filter: brightness(1.1); }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s;
      padding: 1rem;
    }
    .lightbox.open { opacity: 1; visibility: visible; }
    .lightbox img {
      max-width: 95%;
      max-height: 95vh;
      border-radius: var(--radius-sm);
    }
    .lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      color: #fff;
      font-size: 2rem;
      width: 44px;
      height: 44px;
    }

    .error-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--danger);
      color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius-sm);
      z-index: 400;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .error-toast.show { opacity: 1; }

    body.sidebar-open {
      overflow: hidden;
      touch-action: none;
    }

    @media (min-width: 1024px) {
      body.sidebar-open {
        overflow: auto;
        touch-action: auto;
      }
    }

    /* ——— Responsive: phones ——— */
    @media (max-width: 767px) {
      :root {
        --nav-height: 52px;
      }

      .logo { font-size: 1rem; }

      .main-content {
        padding: 0.75rem;
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom, 0));
      }

      .stats-bar {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
      }

      .stat-card { padding: 0.6rem 0.5rem; }
      .stat-card .value { font-size: 1.15rem; }
      .stat-card .label { font-size: 0.65rem; }

      .feed-header {
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
      }

      .feed-header h1 { font-size: 1rem; }

      .feed-header .btn-primary,
      #empty-new-post {
        width: 100%;
        min-height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .post-card {
        padding: 0.85rem 1rem;
        border-radius: var(--radius-sm);
      }

      .post-header {
        padding-right: 0;
        padding-top: 2.75rem;
        gap: 0.4rem;
      }

      .post-actions {
        top: 0.5rem;
        right: 0.5rem;
      }

      .post-time {
        flex-basis: 100%;
        margin-left: 0;
        order: 10;
      }

      .badge {
        font-size: 0.68rem;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .task-checkbox {
        width: 22px;
        height: 22px;
        min-width: 22px;
        min-height: 22px;
      }

      .comment-form textarea,
      .form-group input[type="text"],
      .form-group input[type="date"],
      .form-group select,
      .filter-group select,
      .filter-group input[type="date"],
      .task-builder input {
        font-size: 16px;
      }

      .modal-overlay {
        align-items: flex-end;
        padding: 0;
      }

      .modal-overlay .modal {
        max-width: 100%;
        max-height: min(92dvh, 92vh);
        border-radius: var(--radius) var(--radius) 0 0;
        padding: 1.25rem;
        padding-bottom: max(1.25rem, env(safe-area-inset-bottom, 0));
      }

      .confirm-dialog.modal-overlay {
        align-items: center;
        padding: 1rem;
      }

      .confirm-dialog .modal {
        border-radius: var(--radius);
        max-height: 85dvh;
      }

      .modal-actions {
        flex-direction: column-reverse;
        gap: 0.5rem;
      }

      .modal-actions .btn-primary,
      .modal-actions .btn-secondary,
      .modal-actions .btn-danger {
        width: 100%;
        min-height: 48px;
        justify-content: center;
      }

      .priority-toggle {
        flex-direction: column;
      }

      .priority-toggle button {
        min-height: 48px;
        flex: none;
        width: 100%;
      }

      .task-builder {
        flex-direction: column;
      }

      .task-builder input { width: 100%; min-height: 48px; }

      #add-draft-task {
        width: 100%;
        min-height: 48px;
      }

      .branch-add-row {
        flex-direction: column;
        align-items: stretch;
      }

      .branch-add-row input[type="text"] { min-width: 0; min-height: 48px; }

      .branch-add-row .btn-secondary,
      #save-new-branch {
        width: 100%;
        min-height: 48px;
      }

      .view-toggle button {
        min-height: 48px;
      }

      .btn-clear { min-height: 48px; }

      .comment-actions {
        flex-wrap: wrap;
      }

      .comment-actions .btn-sm,
      .comment-actions .btn-primary {
        min-height: 44px;
        flex: 1 1 auto;
      }

      .attachment-thumb {
        width: 64px;
        height: 64px;
      }

      .empty-state { padding: 2rem 1rem; }
      .empty-illustration { width: 96px; height: 96px; }

      .error-toast {
        left: 0.75rem;
        right: 0.75rem;
        bottom: max(1rem, env(safe-area-inset-bottom, 0));
        transform: none;
        text-align: center;
      }

      .lightbox-close {
        top: max(1rem, env(safe-area-inset-top, 0));
        right: max(1rem, env(safe-area-inset-right, 0));
      }
    }

    /* ——— Responsive: tablets ——— */
    @media (min-width: 768px) and (max-width: 1023px) {
      .main-content { padding: 1.25rem; }

      .sidebar {
        max-width: 340px;
      }

      .stats-bar {
        grid-template-columns: repeat(5, 1fr);
      }

      .post-card { padding: 1.1rem 1.35rem; }

      .modal-overlay { padding: 1.5rem; }

      .modal {
        max-width: 560px;
        max-height: 85dvh;
      }

      .feed-header .btn-primary {
        min-height: 44px;
      }

      .priority-toggle button {
        min-height: 44px;
      }
    }

    /* ——— Touch devices ——— */
    @media (hover: none) and (pointer: coarse) {
      .icon-btn:active,
      .btn-primary:active,
      .btn-secondary:active,
      .view-toggle button:active,
      .btn-clear:active {
        opacity: 0.85;
      }

      .icon-btn:hover,
      .btn-primary:hover,
      .view-toggle button:hover {
        background: inherit;
      }

      .icon-btn:active { background: var(--bg-tertiary); }
      .btn-primary:active { background: var(--accent-hover); }
    }

    /* ——— Landscape phones ——— */
    @media (max-width: 767px) and (orientation: landscape) {
      .modal-overlay .modal {
        max-height: 88dvh;
        border-radius: var(--radius);
      }

      .modal-overlay {
        align-items: center;
        padding: 0.5rem;
      }

      .stats-bar {
        grid-template-columns: repeat(5, 1fr);
      }

      .post-header { padding-top: 2.25rem; }
    }
  </style>
</head>
<body>
  <div id="loading-overlay" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <p>Loading Ops Feed…</p>
  </div>

  <header class="top-nav" role="banner">
    <button type="button" class="icon-btn menu-toggle" id="menu-toggle" aria-label="Open filters" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="logo">Ops<span>Feed</span></div>
    <nav class="nav-filters" aria-label="Quick filters">
      <select id="nav-branch" aria-label="Branch"><option value="">All branches</option></select>
      <select id="nav-cashier" aria-label="Relevant Officer"><option value="">All officers</option></select>
      <select id="nav-priority" aria-label="Priority">
        <option value="">All priorities</option>
        <option value="high">High</option>
        <option value="low">Low</option>
        <option value="none">No Priority</option>
      </select>
    </nav>
    <div class="nav-actions">
      <button type="button" class="icon-btn" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar" aria-label="Filter panel">
      <section class="filter-panel">
        <h2>Filters</h2>
        <div class="filter-group">
          <label>View</label>
          <div class="view-toggle" role="group" aria-label="View mode">
            <button type="button" class="active" data-view="all">All Tasks</button>
            <button type="button" data-view="uncompleted">Uncompleted</button>
            <button type="button" data-view="completed">Completed</button>
          </div>
        </div>
        <div class="filter-group">
          <label for="filter-branch">Branch</label>
          <select id="filter-branch"><option value="">All branches</option></select>
        </div>
        <div class="filter-group">
          <label for="filter-cashier">Relevant Officer</label>
          <select id="filter-cashier"><option value="">All officers</option></select>
        </div>
        <div class="filter-group">
          <label for="filter-priority">Priority</label>
          <select id="filter-priority">
            <option value="">All</option>
            <option value="high">High</option>
            <option value="low">Low</option>
            <option value="none">No Priority</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-date-from">Date from</label>
          <input type="date" id="filter-date-from">
        </div>
        <div class="filter-group">
          <label for="filter-date-to">Date to</label>
          <input type="date" id="filter-date-to">
        </div>
        <div class="filter-group">
          <label for="filter-sort">Sort</label>
          <select id="filter-sort">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="priority">Priority (High → Low → None)</option>
            <option value="tasks">Most tasks</option>
          </select>
        </div>
        <button type="button" class="btn-clear" id="clear-filters">Clear filters</button>
      </section>
    </aside>

    <main class="main-content" role="main">
      <section class="stats-bar" aria-label="Statistics">
        <article class="stat-card"><div class="value" id="stat-posts">0</div><div class="label">Posts</div></article>
        <article class="stat-card"><div class="value" id="stat-tasks">0</div><div class="label">Total tasks</div></article>
        <article class="stat-card"><div class="value" id="stat-completed">0</div><div class="label">Completed</div></article>
        <article class="stat-card"><div class="value" id="stat-uncompleted">0</div><div class="label">Uncompleted</div></article>
        <article class="stat-card"><div class="value" id="stat-rate">0%</div><div class="label">Completion rate</div></article>
      </section>

      <header class="feed-header">
        <h1 style="font-size:1.1rem;font-weight:600">Feed</h1>
        <button type="button" class="btn-primary" id="new-post-btn">+ New Post</button>
      </header>

      <section class="feed" id="feed" aria-live="polite"></section>
    </main>
  </div>

  <!-- New Post Modal -->
  <div class="modal-overlay" id="post-modal" role="dialog" aria-modal="true" aria-labelledby="post-modal-title" hidden>
    <div class="modal">
      <h2 id="post-modal-title">Create New Post</h2>
      <form id="post-form">
        <div class="form-group">
          <label for="post-branch">Branch *</label>
          <select id="post-branch" required>
            <option value="" disabled selected>Select branch…</option>
          </select>
          <div id="branch-add-row" class="branch-add-row" hidden>
            <input type="text" id="post-branch-new" placeholder="New branch name" autocomplete="off" aria-label="New branch name">
            <button type="button" class="btn-secondary" id="save-new-branch">Add branch</button>
            <button type="button" class="branch-add-cancel" id="cancel-new-branch">Cancel</button>
          </div>
        </div>
        <div class="form-group">
          <label for="post-cashier">Relevant Officer <span class="label-optional">(optional)</span></label>
          <input type="text" id="post-cashier" autocomplete="off" placeholder="Leave blank if not applicable">
        </div>
        <div class="form-group">
          <label for="post-date">Date *</label>
          <input type="date" id="post-date" required>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <div class="priority-toggle">
            <button type="button" class="high" data-priority="high">High</button>
            <button type="button" class="low" data-priority="low">Low</button>
            <button type="button" class="none active" data-priority="none">No Priority</button>
          </div>
        </div>
        <div class="form-group">
          <label>Tasks *</label>
          <div class="task-builder">
            <input type="text" id="draft-task-input" placeholder="Enter a task…" autocomplete="off">
            <button type="button" class="btn-secondary" id="add-draft-task">Add Task</button>
          </div>
          <ul class="draft-tasks" id="draft-tasks"></ul>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancel-post">Cancel</button>
          <button type="submit" class="btn-primary" id="post-submit-btn">Post</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay confirm-dialog" id="confirm-modal" role="alertdialog" aria-modal="true" hidden>
    <div class="modal">
      <p id="confirm-message">Are you sure?</p>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="confirm-cancel">Cancel</button>
        <button type="button" class="btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-label="Image preview" hidden>
    <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="Attachment preview">
  </div>

  <div class="error-toast" id="error-toast" role="alert"></div>

  <script>
(function () {
  'use strict';

  const MAX_FILE_SIZE = 5 * 1024 * 1024;
  const THEME_KEY = 'ops-feed-theme';
  const BRANCHES_KEY = 'ops-feed-custom-branches';
  const BRANCH_ADD_VALUE = '__add_new__';

  const DEFAULT_BRANCHES = [
    'Arij',
    'Chilaw',
    'Chilaw Metro',
    'Gampaha',
    'Hatton',
    'Head Office',
    'Homagama',
    'Kalmune',
    'Kandy',
    'Kelaniya',
    'Kohuwala',
    'Kuliyapitiya',
    'Kurunegala',
    'Matar Metro',
    'Negombo',
    'Nuwara Eliya',
    'Panadura',
    'Wennappuwa'
  ];

  const COMING_SOON_BRANCHES = [
    { name: 'Gall', label: 'Gall (coming soon)' }
  ];

  let db;
  let allPosts = [];
  let commentsByPost = {};
  let draftTasks = [];
  let selectedPriority = 'none';
  let editingPostId = null;
  let confirmCallback = null;
  let filters = {
    view: 'all',
    branch: '',
    cashier: '',
    priority: '',
    dateFrom: '',
    dateTo: '',
    sort: 'newest'
  };

  const $ = (sel, ctx = document) => ctx.querySelector(sel);
  const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

  // Theme
  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    const dark = saved === 'dark';
    document.documentElement.classList.toggle('dark', dark);
    updateThemeIcon(dark);
  }

  function updateThemeIcon(dark) {
    $('.icon-sun').style.display = dark ? 'none' : 'block';
    $('.icon-moon').style.display = dark ? 'block' : 'none';
    $('#theme-toggle').setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
  }

  $('#theme-toggle').addEventListener('click', () => {
    const dark = !document.documentElement.classList.contains('dark');
    document.documentElement.classList.toggle('dark', dark);
    localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
    updateThemeIcon(dark);
  });

  initTheme();

  // Database
  async function initDB() {
    db = new Dexie('TaskFeedDB');
    db.version(1).stores({
      posts: '++id, branch, cashier, date, priority, createdAt',
      comments: '++id, postId, createdAt'
    });
    await db.open();
  }

  function uuid() {
    return crypto.randomUUID ? crypto.randomUUID() : 't-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  }

  function relativeTime(ts) {
    const diff = Date.now() - ts;
    const sec = Math.floor(diff / 1000);
    if (sec < 60) return 'just now';
    const min = Math.floor(sec / 60);
    if (min < 60) return min + (min === 1 ? ' minute ago' : ' minutes ago');
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + (hr === 1 ? ' hour ago' : ' hours ago');
    const day = Math.floor(hr / 24);
    if (day < 30) return day + (day === 1 ? ' day ago' : ' days ago');
    const mo = Math.floor(day / 30);
    if (mo < 12) return mo + (mo === 1 ? ' month ago' : ' months ago');
    const yr = Math.floor(mo / 12);
    return yr + (yr === 1 ? ' year ago' : ' years ago');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function getCustomBranches() {
    try {
      const raw = localStorage.getItem(BRANCHES_KEY);
      const list = raw ? JSON.parse(raw) : [];
      return Array.isArray(list) ? list.filter(Boolean) : [];
    } catch {
      return [];
    }
  }

  function saveCustomBranches(list) {
    localStorage.setItem(BRANCHES_KEY, JSON.stringify(list));
  }

  function branchExists(name) {
    const n = name.trim().toLowerCase();
    return DEFAULT_BRANCHES.some(b => b.toLowerCase() === n) ||
      getCustomBranches().some(b => b.toLowerCase() === n) ||
      COMING_SOON_BRANCHES.some(b => b.name.toLowerCase() === n);
  }

  function getAllBranches() {
    const fromPosts = allPosts.map(p => p.branch).filter(Boolean);
    const merged = [...DEFAULT_BRANCHES, ...getCustomBranches(), ...fromPosts];
    return [...new Set(merged)].sort((a, b) => a.localeCompare(b));
  }

  function renderPostBranchSelect(selected = '') {
    const sel = $('#post-branch');
    const branches = getAllBranches();
    let html = '<option value="" disabled' + (selected ? '' : ' selected') + '>Select branch…</option>';
    html += branches.map(b =>
      `<option value="${escapeHtml(b)}"${b === selected ? ' selected' : ''}>${escapeHtml(b)}</option>`
    ).join('');
    COMING_SOON_BRANCHES.forEach(b => {
      if (!branches.includes(b.name)) {
        html += `<option value="${escapeHtml(b.name)}" disabled>${escapeHtml(b.label)}</option>`;
      }
    });
    html += `<option value="${BRANCH_ADD_VALUE}">+ Add new branch…</option>`;
    sel.innerHTML = html;
    if (selected && [...sel.options].some(o => o.value === selected && !o.disabled)) {
      sel.value = selected;
    }
  }

  function showBranchAddRow(show) {
    const row = $('#branch-add-row');
    row.hidden = !show;
    if (show) {
      $('#post-branch-new').value = '';
      $('#post-branch-new').focus();
    }
  }

  function getPostBranchValue() {
    const sel = $('#post-branch');
    if (sel.value === BRANCH_ADD_VALUE || !sel.value) return '';
    const opt = sel.selectedOptions[0];
    if (opt && opt.disabled) return '';
    return sel.value;
  }

  function addCustomBranch(name) {
    const trimmed = name.trim();
    if (!trimmed) {
      showToast('Enter a branch name.');
      return false;
    }
    if (branchExists(trimmed)) {
      showToast('That branch already exists.');
      return false;
    }
    const custom = getCustomBranches();
    custom.push(trimmed);
    custom.sort((a, b) => a.localeCompare(b));
    saveCustomBranches(custom);
    renderPostBranchSelect(trimmed);
    populateFilterDropdowns();
    showBranchAddRow(false);
    showToast(`Branch "${trimmed}" added.`);
    return true;
  }

  function isImageType(type) {
    return type && type.startsWith('image/');
  }

  function priorityRank(priority) {
    if (priority === 'high') return 0;
    if (priority === 'low') return 1;
    return 2;
  }

  function getPriorityDisplay(priority) {
    if (priority === 'high') return { label: 'HIGH', className: 'badge-high' };
    if (priority === 'low') return { label: 'LOW', className: 'badge-low' };
    return { label: 'NO PRIORITY', className: 'badge-none' };
  }

  function showToast(msg) {
    const el = $('#error-toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  // Modals
  function openModal(overlay) {
    closeSidebar();
    overlay.hidden = false;
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(overlay) {
    overlay.classList.remove('open');
    overlay.hidden = true;
    if (!document.querySelector('.modal-overlay.open')) {
      document.body.style.overflow = document.body.classList.contains('sidebar-open') ? 'hidden' : '';
    }
  }

  function setupModalClose(overlay) {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        if (overlay.id === 'post-modal') editingPostId = null;
        closeModal(overlay);
      }
    });
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if ($('#post-modal').classList.contains('open')) editingPostId = null;
      $$('.modal-overlay.open').forEach(closeModal);
      $('#lightbox').classList.remove('open');
    }
  });

  setupModalClose($('#post-modal'));
  setupModalClose($('#confirm-modal'));

  // Sidebar mobile
  const sidebar = $('#sidebar');
  const backdrop = $('#sidebar-backdrop');

  function openSidebar() {
    sidebar.classList.add('open');
    backdrop.classList.add('visible');
    backdrop.hidden = false;
    document.body.classList.add('sidebar-open');
    $('#menu-toggle').setAttribute('aria-expanded', 'true');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    backdrop.classList.remove('visible');
    backdrop.hidden = true;
    document.body.classList.remove('sidebar-open');
    $('#menu-toggle').setAttribute('aria-expanded', 'false');
  }

  $('#menu-toggle').addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  backdrop.addEventListener('click', closeSidebar);

  // Confirm
  function confirmAction(message, onOk) {
    $('#confirm-message').textContent = message;
    confirmCallback = onOk;
    openModal($('#confirm-modal'));
  }

  $('#confirm-cancel').addEventListener('click', () => {
    confirmCallback = null;
    closeModal($('#confirm-modal'));
  });

  $('#confirm-ok').addEventListener('click', () => {
    if (confirmCallback) confirmCallback();
    confirmCallback = null;
    closeModal($('#confirm-modal'));
  });

  // Lightbox
  function openLightbox(src) {
    $('#lightbox-img').src = src;
    $('#lightbox').classList.add('open');
  }

  $('#lightbox-close').addEventListener('click', () => $('#lightbox').classList.remove('open'));
  $('#lightbox').addEventListener('click', (e) => {
    if (e.target === $('#lightbox')) $('#lightbox').classList.remove('open');
  });

  // Load data
  async function loadData() {
    allPosts = await db.posts.orderBy('createdAt').reverse().toArray();
    const comments = await db.comments.toArray();
    commentsByPost = {};
    comments.forEach(c => { commentsByPost[c.postId] = c; });
    populateFilterDropdowns();
    renderPostBranchSelect();
    render();
  }

  function populateFilterDropdowns() {
    const branches = getAllBranches();
    const cashiers = [...new Set(allPosts.map(p => p.cashier).filter(Boolean))].sort();

    ['filter-branch', 'nav-branch'].forEach(id => {
      const sel = $('#' + id);
      const val = sel.value;
      sel.innerHTML = '<option value="">All branches</option>' +
        branches.map(b => `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`).join('');
      if ([...sel.options].some(o => o.value === val)) sel.value = val;
    });

    ['filter-cashier', 'nav-cashier'].forEach(id => {
      const sel = $('#' + id);
      const val = sel.value;
      sel.innerHTML = '<option value="">All officers</option>' +
        cashiers.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
      if ([...sel.options].some(o => o.value === val)) sel.value = val;
    });
  }

  function getFilteredPosts() {
    let posts = [...allPosts];

    if (filters.view === 'uncompleted') {
      posts = posts.filter(p => (p.tasks || []).some(t => !t.completed));
    } else if (filters.view === 'completed') {
      posts = posts.filter(p => {
        const tasks = p.tasks || [];
        return tasks.length > 0 && tasks.every(t => t.completed);
      });
    }

    if (filters.branch) posts = posts.filter(p => p.branch === filters.branch);
    if (filters.cashier) posts = posts.filter(p => p.cashier === filters.cashier);
    if (filters.priority) posts = posts.filter(p => p.priority === filters.priority);

    if (filters.dateFrom) {
      posts = posts.filter(p => p.date >= filters.dateFrom);
    }
    if (filters.dateTo) {
      posts = posts.filter(p => p.date <= filters.dateTo);
    }

    switch (filters.sort) {
      case 'oldest':
        posts.sort((a, b) => a.createdAt - b.createdAt);
        break;
      case 'priority':
        posts.sort((a, b) => {
          const diff = priorityRank(a.priority) - priorityRank(b.priority);
          if (diff !== 0) return diff;
          return b.createdAt - a.createdAt;
        });
        break;
      case 'tasks':
        posts.sort((a, b) => (b.tasks?.length || 0) - (a.tasks?.length || 0));
        break;
      default:
        posts.sort((a, b) => b.createdAt - a.createdAt);
    }

    return posts;
  }

  function updateStats() {
    let totalTasks = 0, completed = 0;
    allPosts.forEach(p => {
      (p.tasks || []).forEach(t => {
        totalTasks++;
        if (t.completed) completed++;
      });
    });
    const uncompleted = totalTasks - completed;
    const rate = totalTasks ? Math.round((completed / totalTasks) * 100) : 0;

    $('#stat-posts').textContent = allPosts.length;
    $('#stat-tasks').textContent = totalTasks;
    $('#stat-completed').textContent = completed;
    $('#stat-uncompleted').textContent = uncompleted;
    $('#stat-rate').textContent = rate + '%';
  }

  function renderAttachments(attachments, postId) {
    if (!attachments?.length) return '';
    return '<div class="attachments">' + attachments.map((a, i) => {
      if (isImageType(a.type)) {
        return `<img class="attachment-thumb" src="${a.dataUrl}" alt="${escapeHtml(a.name)}" data-lightbox="${escapeHtml(a.dataUrl)}" loading="lazy">`;
      }
      return `<a class="attachment-file" href="${a.dataUrl}" download="${escapeHtml(a.name)}">📎 ${escapeHtml(a.name)}</a>`;
    }).join('') + '</div>';
  }

  function renderCommentSection(post) {
    const comment = commentsByPost[post.id];
    if (comment) {
      return `
        <section class="comment-section">
          <div class="comment-display" data-post-id="${post.id}">
            <div class="comment-meta">${relativeTime(comment.createdAt)}</div>
            <div class="comment-text">${escapeHtml(comment.text)}</div>
            ${renderAttachments(comment.attachments, post.id)}
            <div class="comment-actions">
              <button type="button" class="btn-sm btn-edit-comment" data-post-id="${post.id}">Edit</button>
              <button type="button" class="btn-sm btn-delete-comment" data-post-id="${post.id}">Delete</button>
            </div>
          </div>
        </section>`;
    }
    return `
      <section class="comment-section">
        <button type="button" class="btn-sm btn-add-comment" data-post-id="${post.id}">Add Comment</button>
        <div class="comment-form" id="comment-form-${post.id}" style="display:none" data-post-id="${post.id}">
          <textarea placeholder="Write a comment…" aria-label="Comment text"></textarea>
          <div class="file-row">
            <input type="file" multiple accept="image/*,*/*" aria-label="Attach files">
            <div class="pending-attachments"></div>
          </div>
          <div class="comment-actions">
            <button type="button" class="btn-sm btn-cancel-comment">Cancel</button>
            <button type="button" class="btn-primary btn-submit-comment" style="padding:0.35rem 0.75rem;font-size:0.8rem">Submit</button>
          </div>
        </div>
      </section>`;
  }

  function renderPostCard(post) {
    const tasks = post.tasks || [];
    const done = tasks.filter(t => t.completed).length;
    const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
    const { label: pri, className: priClass } = getPriorityDisplay(post.priority);

    const taskHtml = tasks.map(t => `
      <li class="task-item${t.completed ? ' checked' : ''}" data-post-id="${post.id}" data-task-id="${t.id}">
        <input type="checkbox" class="task-checkbox" ${t.completed ? 'checked' : ''} aria-label="Toggle task">
        <span class="task-text">${escapeHtml(t.text)}</span>
      </li>
    `).join('');

    return `
      <article class="post-card" data-post-id="${post.id}">
        <div class="post-actions">
          <button type="button" class="btn-edit-post" aria-label="Edit post" data-post-id="${post.id}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button type="button" class="btn-delete-post" aria-label="Delete post" data-post-id="${post.id}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
        </div>
        <header class="post-header">
          <span class="badge badge-branch">${escapeHtml(post.branch)}</span>
          ${post.cashier ? `<span class="badge badge-cashier">${escapeHtml(post.cashier)}</span>` : ''}
          <span class="badge badge-date">${escapeHtml(post.date)}</span>
          <span class="badge ${priClass}">${pri}</span>
          <time class="post-time" datetime="${new Date(post.createdAt).toISOString()}">${relativeTime(post.createdAt)}</time>
        </header>
        <section aria-label="Tasks">
          <ul class="task-list">${taskHtml}</ul>
          <p class="task-progress-text">${done} / ${tasks.length} tasks completed</p>
          <div class="progress-bar" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
        </section>
        ${renderCommentSection(post)}
      </article>
    `;
  }

  function render() {
    updateStats();
    const feed = $('#feed');
    const posts = getFilteredPosts();
    const hasFilters = filters.view !== 'all' || filters.branch || filters.cashier ||
      filters.priority || filters.dateFrom || filters.dateTo || filters.sort !== 'newest';

    if (!allPosts.length) {
      feed.innerHTML = `
        <div class="empty-state">
          <svg class="empty-illustration" viewBox="0 0 120 120" aria-hidden="true">
            <rect x="20" y="30" width="80" height="60" rx="8" fill="var(--bg-tertiary)" stroke="var(--border)" stroke-width="2"/>
            <line x1="32" y1="48" x2="88" y2="48" stroke="var(--border-strong)" stroke-width="2"/>
            <line x1="32" y1="60" x2="70" y2="60" stroke="var(--border)" stroke-width="2"/>
            <line x1="32" y1="72" x2="55" y2="72" stroke="var(--border)" stroke-width="2"/>
            <circle cx="90" cy="85" r="18" fill="var(--accent)" opacity="0.2"/>
            <text x="90" y="90" text-anchor="middle" fill="var(--accent)" font-size="20" font-weight="bold">+</text>
          </svg>
          <h3>No posts yet</h3>
          <p>Create your first post to get started!</p>
          <button type="button" class="btn-primary" id="empty-new-post">+ New Post</button>
        </div>`;
      $('#empty-new-post')?.addEventListener('click', openPostModal);
      return;
    }

    if (!posts.length) {
      feed.innerHTML = `
        <div class="empty-state">
          <h3>No posts match your filters</h3>
          <p>Try adjusting or clearing your filters.</p>
          <button type="button" class="btn-primary" id="empty-clear-filters">Clear filters</button>
        </div>`;
      $('#empty-clear-filters')?.addEventListener('click', clearAllFilters);
      return;
    }

    feed.innerHTML = posts.map(renderPostCard).join('');
    bindFeedEvents();
  }

  function bindFeedEvents() {
    $$('.task-checkbox').forEach(cb => {
      cb.addEventListener('change', async (e) => {
        const li = e.target.closest('.task-item');
        const postId = +li.dataset.postId;
        const taskId = li.dataset.taskId;
        li.classList.toggle('checked', e.target.checked);
        const post = allPosts.find(p => p.id === postId);
        if (!post) return;
        const task = post.tasks.find(t => t.id === taskId);
        if (task) {
          task.completed = e.target.checked;
          await db.posts.update(postId, { tasks: post.tasks });
          render();
        }
      });
    });

    $$('.btn-edit-post').forEach(btn => {
      btn.addEventListener('click', () => {
        const post = allPosts.find(p => p.id === +btn.dataset.postId);
        if (post) openEditPostModal(post);
      });
    });

    $$('.btn-delete-post').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = +btn.dataset.postId;
        confirmAction('Delete this post and its comment?', async () => {
          await db.comments.where('postId').equals(id).delete();
          await db.posts.delete(id);
          allPosts = allPosts.filter(p => p.id !== id);
          delete commentsByPost[id];
          populateFilterDropdowns();
          render();
        });
      });
    });

    $$('.btn-add-comment').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.postId;
        btn.style.display = 'none';
        $(`#comment-form-${id}`).style.display = 'block';
      });
    });

    $$('.btn-cancel-comment').forEach(btn => {
      btn.addEventListener('click', () => {
        const form = btn.closest('.comment-form');
        const postId = form.dataset.postId;
        form.style.display = 'none';
        form.querySelector('textarea').value = '';
        form.querySelector('input[type=file]').value = '';
        form._pendingFiles = [];
        form.querySelector('.pending-attachments').innerHTML = '';
        $(`.btn-add-comment[data-post-id="${postId}"]`).style.display = '';
      });
    });

    $$('.comment-form input[type=file]').forEach(input => {
      input.addEventListener('change', async (e) => {
        const form = e.target.closest('.comment-form');
        form._pendingFiles = form._pendingFiles || [];
        const pendingEl = form.querySelector('.pending-attachments');
        for (const file of e.target.files) {
          if (file.size > MAX_FILE_SIZE) {
            showToast(`"${file.name}" exceeds 5MB and was skipped.`);
            continue;
          }
          const dataUrl = await readFileAsDataURL(file);
          form._pendingFiles.push({ name: file.name, type: file.type, dataUrl });
          pendingEl.innerHTML += `<span class="pending-tag">${escapeHtml(file.name)}</span>`;
        }
        e.target.value = '';
      });
    });

    $$('.btn-submit-comment').forEach(btn => {
      btn.addEventListener('click', async () => {
        const form = btn.closest('.comment-form');
        const postId = +form.dataset.postId;
        const text = form.querySelector('textarea').value.trim();
        if (!text) {
          showToast('Please enter comment text.');
          return;
        }
        const attachments = form._pendingFiles || [];
        const comment = {
          postId,
          text,
          attachments,
          createdAt: Date.now()
        };
        const id = await db.comments.add(comment);
        comment.id = id;
        commentsByPost[postId] = comment;
        render();
      });
    });

    $$('.btn-edit-comment').forEach(btn => {
      btn.addEventListener('click', () => {
        const postId = +btn.dataset.postId;
        const comment = commentsByPost[postId];
        const section = btn.closest('.comment-section');
        section.innerHTML = `
          <div class="comment-form" data-post-id="${postId}" data-edit-id="${comment.id}">
            <textarea aria-label="Edit comment"></textarea>
            <div class="file-row">
              <input type="file" multiple accept="image/*,*/*">
              <div class="pending-attachments">${(comment.attachments||[]).map(a =>
                `<span class="pending-tag">${escapeHtml(a.name)}</span>`).join('')}</div>
            </div>
            <div class="comment-actions">
              <button type="button" class="btn-sm btn-cancel-edit">Cancel</button>
              <button type="button" class="btn-primary btn-save-edit" style="padding:0.35rem 0.75rem;font-size:0.8rem">Save</button>
            </div>
          </div>`;
        const form = section.querySelector('.comment-form');
        form.querySelector('textarea').value = comment.text;
        form._pendingFiles = [...(comment.attachments || [])];
        form.querySelector('input[type=file]').addEventListener('change', async (e) => {
          const pendingEl = form.querySelector('.pending-attachments');
          for (const file of e.target.files) {
            if (file.size > MAX_FILE_SIZE) {
              showToast(`"${file.name}" exceeds 5MB and was skipped.`);
              continue;
            }
            const dataUrl = await readFileAsDataURL(file);
            form._pendingFiles.push({ name: file.name, type: file.type, dataUrl });
            pendingEl.innerHTML += `<span class="pending-tag">${escapeHtml(file.name)}</span>`;
          }
          e.target.value = '';
        });
        form.querySelector('.btn-cancel-edit').addEventListener('click', () => render());
        form.querySelector('.btn-save-edit').addEventListener('click', async () => {
          const text = form.querySelector('textarea').value.trim();
          if (!text) { showToast('Comment cannot be empty.'); return; }
          await db.comments.update(comment.id, {
            text,
            attachments: form._pendingFiles || []
          });
          comment.text = text;
          comment.attachments = form._pendingFiles || [];
          render();
        });
      });
    });

    $$('.btn-delete-comment').forEach(btn => {
      btn.addEventListener('click', () => {
        const postId = +btn.dataset.postId;
        const comment = commentsByPost[postId];
        confirmAction('Delete this comment?', async () => {
          await db.comments.delete(comment.id);
          delete commentsByPost[postId];
          render();
        });
      });
    });

    $$('[data-lightbox]').forEach(img => {
      img.addEventListener('click', () => openLightbox(img.dataset.lightbox));
    });
  }

  function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  // Filters
  function syncFilter(key, value) {
    if (window.matchMedia('(max-width: 1023px)').matches) closeSidebar();
    filters[key] = value;
    if (key === 'branch') {
      $('#filter-branch').value = value;
      $('#nav-branch').value = value;
    }
    if (key === 'cashier') {
      $('#filter-cashier').value = value;
      $('#nav-cashier').value = value;
    }
    if (key === 'priority') {
      $('#filter-priority').value = value;
      $('#nav-priority').value = value;
    }
    render();
  }

  $$('.view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.view-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filters.view = btn.dataset.view;
      if (window.matchMedia('(max-width: 1023px)').matches) closeSidebar();
      render();
    });
  });

  $('#filter-branch').addEventListener('change', e => syncFilter('branch', e.target.value));
  $('#nav-branch').addEventListener('change', e => syncFilter('branch', e.target.value));
  $('#filter-cashier').addEventListener('change', e => syncFilter('cashier', e.target.value));
  $('#nav-cashier').addEventListener('change', e => syncFilter('cashier', e.target.value));
  $('#filter-priority').addEventListener('change', e => syncFilter('priority', e.target.value));
  $('#nav-priority').addEventListener('change', e => syncFilter('priority', e.target.value));
  $('#filter-date-from').addEventListener('change', e => { filters.dateFrom = e.target.value; render(); });
  $('#filter-date-to').addEventListener('change', e => { filters.dateTo = e.target.value; render(); });
  $('#filter-sort').addEventListener('change', e => { filters.sort = e.target.value; render(); });

  function clearAllFilters() {
    filters = { view: 'all', branch: '', cashier: '', priority: '', dateFrom: '', dateTo: '', sort: 'newest' };
    $$('.view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === 'all'));
    $('#filter-branch').value = '';
    $('#nav-branch').value = '';
    $('#filter-cashier').value = '';
    $('#nav-cashier').value = '';
    $('#filter-priority').value = '';
    $('#nav-priority').value = '';
    $('#filter-date-from').value = '';
    $('#filter-date-to').value = '';
    $('#filter-sort').value = 'newest';
    render();
  }

  $('#clear-filters').addEventListener('click', clearAllFilters);

  // Post modal (create & edit)
  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function setPostModalMode(mode) {
    const isEdit = mode === 'edit';
    $('#post-modal-title').textContent = isEdit ? 'Edit Post' : 'Create New Post';
    $('#post-submit-btn').textContent = isEdit ? 'Save changes' : 'Post';
  }

  function setPriorityToggle(priority) {
    const p = priority === 'high' || priority === 'low' ? priority : 'none';
    selectedPriority = p;
    $$('.priority-toggle button').forEach(b => b.classList.toggle('active', b.dataset.priority === p));
  }

  function closePostModal() {
    editingPostId = null;
    closeModal($('#post-modal'));
  }

  function openPostModal() {
    editingPostId = null;
    draftTasks = [];
    setPostModalMode('create');
    $('#post-form').reset();
    $('#post-date').value = todayISO();
    setPriorityToggle('none');
    renderPostBranchSelect();
    showBranchAddRow(false);
    renderDraftTasks();
    openModal($('#post-modal'));
  }

  function openEditPostModal(post) {
    editingPostId = post.id;
    setPostModalMode('edit');
    $('#post-form').reset();
    $('#post-cashier').value = post.cashier || '';
    $('#post-date').value = post.date;
    setPriorityToggle(post.priority);
    renderPostBranchSelect(post.branch);
    showBranchAddRow(false);
    draftTasks = (post.tasks || []).map(t => ({
      id: t.id,
      text: t.text,
      completed: !!t.completed
    }));
    renderDraftTasks();
    openModal($('#post-modal'));
  }

  function renderDraftTasks() {
    const isEdit = editingPostId != null;
    $('#draft-tasks').innerHTML = draftTasks.map((t, i) => {
      const text = t.text ?? t;
      if (isEdit) {
        return `<li><input type="text" class="draft-task-edit" value="${escapeHtml(text)}" data-index="${i}" aria-label="Task ${i + 1}"><button type="button" class="remove-task" data-index="${i}" aria-label="Remove task">&times;</button></li>`;
      }
      return `<li>${escapeHtml(text)} <button type="button" class="remove-task" data-index="${i}" aria-label="Remove task">&times;</button></li>`;
    }).join('');

    $$('.draft-task-edit', $('#draft-tasks')).forEach(inp => {
      inp.addEventListener('input', () => {
        const i = +inp.dataset.index;
        if (draftTasks[i]) draftTasks[i].text = inp.value;
      });
    });

    $$('.remove-task', $('#draft-tasks')).forEach(btn => {
      btn.addEventListener('click', () => {
        draftTasks.splice(+btn.dataset.index, 1);
        renderDraftTasks();
      });
    });
  }

  function buildTasksFromDraft() {
    return draftTasks.map(t => {
      const text = (t.text ?? t).trim();
      return {
        id: t.id || uuid(),
        text,
        completed: !!t.completed
      };
    }).filter(t => t.text);
  }

  $('#new-post-btn').addEventListener('click', openPostModal);
  $('#cancel-post').addEventListener('click', closePostModal);

  $$('.priority-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.priority-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPriority = btn.dataset.priority;
    });
  });

  function addDraftTask() {
    const input = $('#draft-task-input');
    const text = input.value.trim();
    if (!text) return;
    draftTasks.push({ id: uuid(), text, completed: false });
    input.value = '';
    renderDraftTasks();
    input.focus();
  }

  $('#add-draft-task').addEventListener('click', addDraftTask);
  $('#draft-task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addDraftTask(); }
  });

  $('#post-branch').addEventListener('change', () => {
    showBranchAddRow($('#post-branch').value === BRANCH_ADD_VALUE);
  });

  $('#save-new-branch').addEventListener('click', () => {
    addCustomBranch($('#post-branch-new').value);
  });

  $('#post-branch-new').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addCustomBranch($('#post-branch-new').value);
    }
  });

  $('#cancel-new-branch').addEventListener('click', () => {
    showBranchAddRow(false);
    const sel = $('#post-branch');
    if (sel.value === BRANCH_ADD_VALUE) sel.value = '';
  });

  $('#post-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const tasks = buildTasksFromDraft();
    if (!tasks.length) {
      showToast('Add at least one task.');
      return;
    }
    const branch = getPostBranchValue();
    if (!branch) {
      if ($('#post-branch').value === BRANCH_ADD_VALUE) {
        showToast('Add a new branch or select an existing one.');
      } else {
        showToast('Please select a branch.');
      }
      return;
    }
    const cashier = $('#post-cashier').value.trim();

    const fields = { branch, cashier: cashier || '', date: $('#post-date').value, priority: selectedPriority, tasks };

    if (editingPostId) {
      await db.posts.update(editingPostId, fields);
      const post = allPosts.find(p => p.id === editingPostId);
      if (post) Object.assign(post, fields);
      populateFilterDropdowns();
      closePostModal();
      render();
      showToast('Post updated.');
      const card = $(`.post-card[data-post-id="${editingPostId}"]`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }

    const post = { ...fields, createdAt: Date.now() };
    const id = await db.posts.add(post);
    post.id = id;
    allPosts.unshift(post);
    populateFilterDropdowns();
    closePostModal();
    render();
    const card = $(`.post-card[data-post-id="${id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  // Init
  (async function boot() {
    try {
      await initDB();
      renderPostBranchSelect();
      await loadData();
    } catch (err) {
      console.error(err);
      showToast('Failed to initialize database. Try refreshing the page.');
    } finally {
      const overlay = $('#loading-overlay');
      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 400);
    }
  })();
})();
  </script>
</body>
